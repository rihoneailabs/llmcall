name: Semantic Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Detect next version
          NEXT_VERSION=$(poetry run semantic-release version --print 2>/dev/null || true)
          echo "Next version: $NEXT_VERSION"
          
          if [ -n "$NEXT_VERSION" ] && [ "$NEXT_VERSION" != "None" ]; then
            # Generate local version bump and changelog locally without pushing/tagging/releasing
            poetry run semantic-release version --no-push --no-tag --no-vcs-release --no-commit
            
            # Setup bump branch
            BRANCH_NAME="bump/v$NEXT_VERSION"
            git checkout -b "$BRANCH_NAME"
            
            # Commit the bumping changes
            git add pyproject.toml CHANGELOG.md llmcall/__init__.py 2>/dev/null || true
            git commit -m "chore(release): bump version to $NEXT_VERSION [skip ci]"
            
            # Push the bump branch to origin
            git push origin "$BRANCH_NAME" --force
            
            # Create a pull request via GitHub CLI
            gh pr create \
              --title "chore(release): bump version to $NEXT_VERSION [skip ci]" \
              --body "Automated version bump to $NEXT_VERSION [skip ci]" \
              --head "$BRANCH_NAME" \
              --base "main" || true
              
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "No release detected."
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

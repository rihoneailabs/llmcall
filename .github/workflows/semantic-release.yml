name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    concurrency: semantic-release

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run Semantic Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION=$(poetry version --short)
          CURRENT_TAG="v$CURRENT_VERSION"
          TAG_SHA=$(git rev-list -n 1 "$CURRENT_TAG" 2>/dev/null || true)

          if [ -z "$TAG_SHA" ] && git log -1 --pretty=%B | grep -q "chore(release): bump version to $CURRENT_VERSION"; then
            git tag "$CURRENT_TAG"
            git push origin "$CURRENT_TAG"
            exit 0
          fi

          NEXT_VERSION=$(poetry run semantic-release version --print 2>/dev/null || true)
          echo "Current version: $CURRENT_VERSION"
          echo "Next version: $NEXT_VERSION"

          if [ -n "$NEXT_VERSION" ] && [ "$NEXT_VERSION" != "None" ] && [ "$NEXT_VERSION" != "$CURRENT_VERSION" ]; then
            poetry run semantic-release version --no-push --no-tag --no-vcs-release --no-commit --no-changelog --skip-build

            BRANCH_NAME="bump/v$NEXT_VERSION"
            PR_TITLE="chore(release): bump version to $NEXT_VERSION [skip ci]"
            PR_BODY="Automated version bump to $NEXT_VERSION [skip ci]"

            git checkout -B "$BRANCH_NAME"
            git add pyproject.toml
            git commit -m "$PR_TITLE"
            git push origin "$BRANCH_NAME" --force

            PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty')
            if [ -n "$PR_NUMBER" ]; then
              gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
            else
              gh pr create \
                --title "$PR_TITLE" \
                --body "$PR_BODY" \
                --head "$BRANCH_NAME" \
                --base "main"
            fi
          else
            echo "No release detected."
          fi